name: Deploy to Contabo
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.DEPLOY_KEY }}

      - name: Sync files to server
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude ".git" \
            --exclude "node_modules/" \
            --exclude "web/dist/" \
            --exclude ".env" \
            --exclude "data.db" \
            --exclude ".env.example" \
            ./ $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/

      - name: Post-deploy (install, build, restart)
        run: |
          ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST <<'EOF'
          set -e
          cd "$DEPLOY_DIR"
          if command -v npm >/dev/null 2>&1; then
            install_node_project() {
              local dir="$1"
              echo "Processing Node project in $dir"
              if [ -f "$dir/package.json" ]; then
                pushd "$dir" >/dev/null
                if [ -f package-lock.json ]; then
                  npm ci --omit=dev || npm install --omit=dev
                else
                  npm install --omit=dev
                fi
                npm run build --if-present || true
                popd >/dev/null
              else
                echo "Skipping $dir: package.json not found"
              fi
            }

            install_node_project "."
            install_node_project "server"
            install_node_project "web"

            if [ -f "server/package.json" ]; then
              pushd "server" >/dev/null
              pm2 restart ariseandshine || pm2 start npm --name "ariseandshine" -- run start
              pm2 save
              popd >/dev/null
            else
              echo "Skipping pm2 restart: server/package.json not found"
            fi
          fi
          EOF
